<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>启阳塾 JLPT Score Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="top-nav">
        <div class="brand-block">
          <img class="brand-logo" src="assets/logo.jpg" alt="启阳塾 Logo" />
          <div>
            <p class="brand-name">启阳塾</p>
            <p class="brand-title">KEIYO ACADEMY</p>
            <p class="brand-tag">JLPT SCORE CALCULATOR</p>
          </div>
        </div>
      </header>

      <section class="panel-card level-card">
        <div class="panel-title">
          <div>
            <p class="panel-label">考试等级</p>
            <h2>请选择 N1 或 N2</h2>
          </div>
        </div>
        <div class="segmented level-select">
          <label><input type="radio" name="level" value="N1" /><span>N1</span></label>
          <label><input type="radio" name="level" value="N2" checked /><span>N2</span></label>
        </div>
      </section>

      <section id="questions-container" class="inputs-panel"></section>

      <section class="action-panel">
        <button id="calc" class="btn-primary">计算估分</button>
        <button id="reset" class="btn-ghost">重置</button>
      </section>

      <section class="panel-card result-panel" aria-live="polite">
        <div class="result-overview">
          <div class="score-card official-card">
            <p class="score-label">官方估分</p>
            <div class="score-value" id="official-score">—</div>
          </div>
          <div class="score-card qiyang-card">
            <p class="score-label">启阳塾估分</p>
            <div class="score-value" id="qiyang-score">—</div>
          </div>
        </div>

        <div class="ring-panel">
          <div class="ring-chart">
            <div class="ring-inner">
              <p class="ring-title">总分</p>
              <p class="ring-number" id="ring-score">—</p>
            </div>
          </div>
        </div>

        <div class="detail-scores">
          <div class="detail-item">
            <div class="detail-title">语言知识</div>
            <div class="detail-values">
              <span id="official-lang">—</span>
              <span id="qiyang-lang">—</span>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-title">阅读</div>
            <div class="detail-values">
              <span id="official-read">—</span>
              <span id="qiyang-read">—</span>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-title">听力</div>
            <div class="detail-values">
              <span id="official-listen">—</span>
              <span id="qiyang-listen">—</span>
            </div>
          </div>
        </div>

        <div class="probability-panel">
          <div class="probability-header">
            <div>
              <p class="panel-label">合格概率</p>
              <strong id="probability-percent">—</strong>
            </div>
            <p id="pass-status" class="pass-text">—</p>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="probability-bar"></div>
          </div>
        </div>

        <section class="teacher-card">
          <p class="teacher-title">老师点评</p>
          <p class="teacher-text" id="teacher-comment">—</p>
        </section>

        <p class="disclaimer">仅供参考，最终成绩以考试机构公布为准。</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
